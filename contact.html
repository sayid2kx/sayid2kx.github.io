<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />

  </head>
  <body>
    <header>
      <nav>
        <ul class="nav">
          <li><a href="index.html">About</a></li>
          <li><a href="skills.html">Skills & Education</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <div class="contact-section">
      <h1>CONTACT</h1>
      <p>Are You Looking For Frontend Web Developer? I am here.</p>
      <div class="contact-list">
        <div class="email-name">
          <a href="mailto:sayid2kx@gmail.com">Email: sayid2kx@gmail.com</a>
        </div>
        <div class="twitter-name">
          <a href="http://www.x.com/sayid2kx">Twitter</a>
        </div>
        <div class="linkedin-name">
          <a href="http://www.linkedin.com/in/sayid2kx">LinkedIn</a>
        </div>
      </div>
      <div class="form-container">
        <p>Please fill this form in a decent manner</p>
        <form>
          <div class="name-field">
            <div>
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" name="first-name" />
            </div>
            <div>
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" name="last-name" />
            </div>
          </div>
          <div class="email-field">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@example.com"
            />
          </div>
          <div class="message-field">
            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>
          </div>
          <button type="submit">SUBMIT</button>
        </form>
      </div>
    </div>
  </body>
